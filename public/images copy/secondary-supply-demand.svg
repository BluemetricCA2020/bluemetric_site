<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Inter, Arial, sans-serif">
  <rect width="720" height="420" fill="white"/>
  <text x="360" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#1A2E4A">Figure 2 — Secondary Market: Capital Supply vs Transaction Volume</text>

  <!--
    Dual-axis chart: left Y = $B (0-400), right Y = Capital/Volume ratio (0x-4x)
    $100B = 1x → same gridlines: y=228 for $100/$1x, y=170 for $200/$2x, etc.
    Chart area: x=70 to 660 (590px), y=55 to 285 (230px)
    Left scale: 230/400 = 0.575 px/$B  → y = 285 − val × 0.575
    Right scale: 230/4 = 57.5 px/x     → y = 285 − ratio × 57.5  (identical gridlines)
    11 groups (2015–2025), group width=53.6px
    Centers: 97,150,204,258,311,365,418,472,526,579,633
    Available capital: x=center−21, width=18 (navy)
    Secondary volume:  x=center−1,  width=18 (accent blue)
  -->

  <!-- Gridlines ($100=$1x … $400=$4x) -->
  <line x1="70" y1="55"  x2="660" y2="55"  stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="113" x2="660" y2="113" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="170" x2="660" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="228" x2="660" y2="228" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="285" x2="660" y2="285" stroke="#999" stroke-width="1"/>
  <!-- Left Y axis -->
  <line x1="70"  y1="50" x2="70"  y2="289" stroke="#999" stroke-width="1"/>
  <!-- Right Y axis -->
  <line x1="660" y1="50" x2="660" y2="289" stroke="#bbb" stroke-width="1"/>
  <!-- Left Y labels ($B) -->
  <text x="63"  y="289" text-anchor="end" font-size="9" fill="#666">$0</text>
  <text x="63"  y="232" text-anchor="end" font-size="9" fill="#666">$100</text>
  <text x="63"  y="174" text-anchor="end" font-size="9" fill="#666">$200</text>
  <text x="63"  y="117" text-anchor="end" font-size="9" fill="#666">$300</text>
  <text x="63"  y="59"  text-anchor="end" font-size="9" fill="#666">$400B</text>
  <!-- Right Y labels (ratio) -->
  <text x="667" y="289" font-size="9" fill="#C5A55A">0x</text>
  <text x="667" y="232" font-size="9" fill="#C5A55A">1x</text>
  <text x="667" y="174" font-size="9" fill="#C5A55A">2x</text>
  <text x="667" y="117" font-size="9" fill="#C5A55A">3x</text>
  <text x="667" y="59"  font-size="9" fill="#C5A55A">4x</text>

  <!--
    Available capital ($B): 97,111,119,187,144,186,241,216,262,288,315
    Heights: 55.8,63.8,68.4,107.5,82.8,107,138.6,124.2,150.7,165.6,181.1
    Y-starts: 229,221,217,177,202,178,146,161,134,119,104

    Secondary volume ($B): 42,37,54,72,80,60,134,103,114,160,210
    Heights: 24.2,21.3,31.1,41.4,46,34.5,77.1,59.2,65.6,92,120.8
    Y-starts: 261,264,254,244,239,251,208,226,219,193,164
  -->

  <!-- Available capital bars (navy) -->
  <rect x="76"  y="229" width="18" height="56"  fill="#1A2E4A" opacity="0.9"/>
  <rect x="129" y="221" width="18" height="64"  fill="#1A2E4A" opacity="0.9"/>
  <rect x="183" y="217" width="18" height="68"  fill="#1A2E4A" opacity="0.9"/>
  <rect x="237" y="177" width="18" height="108" fill="#1A2E4A" opacity="0.9"/>
  <rect x="290" y="202" width="18" height="83"  fill="#1A2E4A" opacity="0.9"/>
  <rect x="344" y="178" width="18" height="107" fill="#1A2E4A" opacity="0.9"/>
  <rect x="397" y="146" width="18" height="139" fill="#1A2E4A" opacity="0.9"/>
  <rect x="451" y="161" width="18" height="124" fill="#1A2E4A" opacity="0.9"/>
  <rect x="505" y="134" width="18" height="151" fill="#1A2E4A" opacity="0.9"/>
  <rect x="558" y="119" width="18" height="166" fill="#1A2E4A" opacity="0.9"/>
  <rect x="612" y="104" width="18" height="181" fill="#1A2E4A" opacity="0.7"/>

  <!-- Secondary volume bars (accent blue) -->
  <rect x="96"  y="261" width="18" height="24"  fill="#4C90B7"/>
  <rect x="149" y="264" width="18" height="21"  fill="#4C90B7"/>
  <rect x="203" y="254" width="18" height="31"  fill="#4C90B7"/>
  <rect x="257" y="244" width="18" height="41"  fill="#4C90B7"/>
  <rect x="310" y="239" width="18" height="46"  fill="#4C90B7"/>
  <rect x="364" y="251" width="18" height="34"  fill="#4C90B7"/>
  <rect x="417" y="208" width="18" height="77"  fill="#4C90B7"/>
  <rect x="471" y="226" width="18" height="59"  fill="#4C90B7"/>
  <rect x="525" y="219" width="18" height="66"  fill="#4C90B7"/>
  <rect x="578" y="193" width="18" height="92"  fill="#4C90B7"/>
  <rect x="632" y="164" width="18" height="121" fill="#4C90B7" opacity="0.7"/>

  <!-- Capital/Volume ratio line (gold) with data labels -->
  <polyline points="97,153 150,113 204,159 258,136 311,182 365,107 418,182 472,164 526,153 579,182 633,199" fill="none" stroke="#C5A55A" stroke-width="2"/>
  <!-- Dots -->
  <circle cx="97"  cy="153" r="3.5" fill="#C5A55A"/>
  <circle cx="150" cy="113" r="3.5" fill="#C5A55A"/>
  <circle cx="204" cy="159" r="3.5" fill="#C5A55A"/>
  <circle cx="258" cy="136" r="3.5" fill="#C5A55A"/>
  <circle cx="311" cy="182" r="3.5" fill="#C5A55A"/>
  <circle cx="365" cy="107" r="3.5" fill="#C5A55A"/>
  <circle cx="418" cy="182" r="3.5" fill="#C5A55A"/>
  <circle cx="472" cy="164" r="3.5" fill="#C5A55A"/>
  <circle cx="526" cy="153" r="3.5" fill="#C5A55A"/>
  <circle cx="579" cy="182" r="3.5" fill="#C5A55A"/>
  <circle cx="633" cy="199" r="3.5" fill="#C5A55A"/>
  <!-- Ratio labels -->
  <text x="97"  y="143" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">2.3x</text>
  <text x="150" y="103" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">3.0x</text>
  <text x="204" y="149" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">2.2x</text>
  <text x="258" y="126" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">2.6x</text>
  <text x="311" y="172" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">1.8x</text>
  <text x="365" y="97"  text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">3.1x</text>
  <text x="418" y="172" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">1.8x</text>
  <text x="472" y="154" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">2.1x</text>
  <text x="526" y="143" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">2.3x</text>
  <text x="579" y="172" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">1.8x</text>
  <text x="633" y="189" text-anchor="middle" font-size="8" fill="#C5A55A" font-weight="600">1.5x</text>

  <!-- X labels -->
  <text x="97"  y="299" text-anchor="middle" font-size="9" fill="#555">2015</text>
  <text x="150" y="299" text-anchor="middle" font-size="9" fill="#555">2016</text>
  <text x="204" y="299" text-anchor="middle" font-size="9" fill="#555">2017</text>
  <text x="258" y="299" text-anchor="middle" font-size="9" fill="#555">2018</text>
  <text x="311" y="299" text-anchor="middle" font-size="9" fill="#555">2019</text>
  <text x="365" y="299" text-anchor="middle" font-size="9" fill="#555">2020</text>
  <text x="418" y="299" text-anchor="middle" font-size="9" fill="#555">2021</text>
  <text x="472" y="299" text-anchor="middle" font-size="9" fill="#555">2022</text>
  <text x="526" y="299" text-anchor="middle" font-size="9" fill="#555">2023</text>
  <text x="579" y="299" text-anchor="middle" font-size="9" fill="#555">2024</text>
  <text x="633" y="299" text-anchor="middle" font-size="9" fill="#888">2025E</text>

  <!-- Legend -->
  <rect x="90"  y="320" width="12" height="12" fill="#1A2E4A" opacity="0.9"/>
  <text x="106" y="331" font-size="11" fill="#555">Available capital</text>
  <rect x="260" y="320" width="12" height="12" fill="#4C90B7"/>
  <text x="276" y="331" font-size="11" fill="#555">Secondary volume</text>
  <line x1="430" y1="326" x2="452" y2="326" stroke="#C5A55A" stroke-width="2"/>
  <circle cx="441" cy="326" r="3" fill="#C5A55A"/>
  <text x="457" y="331" font-size="11" fill="#555">Capital / Volume ratio</text>

  <!-- Source -->
  <text x="360" y="358" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Source: Jefferies, Global Secondaries Market Review (2021 &amp; 2025).</text>
