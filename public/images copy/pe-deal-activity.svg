<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Inter, Arial, sans-serif">
  <rect width="680" height="360" fill="white"/>
  <text x="330" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 1 — Deal Activity Development</text>
  <!-- Gridlines -->
  <line x1="80" y1="55" x2="580" y2="55" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="113" x2="580" y2="113" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="170" x2="580" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="228" x2="580" y2="228" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="285" x2="580" y2="285" stroke="#999" stroke-width="1"/>
  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="289" stroke="#999" stroke-width="1"/>
  <line x1="580" y1="50" x2="580" y2="289" stroke="#bbb" stroke-width="1"/>
  <!-- Left Y labels (deals) -->
  <text x="73" y="289" text-anchor="end" font-size="11" fill="#666">0</text>
  <text x="73" y="232" text-anchor="end" font-size="11" fill="#666">3,000</text>
  <text x="73" y="174" text-anchor="end" font-size="11" fill="#666">6,000</text>
  <text x="73" y="117" text-anchor="end" font-size="11" fill="#666">9,000</text>
  <text x="73" y="59" text-anchor="end" font-size="11" fill="#666">12,000</text>
  <!-- Right Y labels (value $B) -->
  <text x="587" y="289" font-size="11" fill="#C5A55A">$0</text>
  <text x="587" y="232" font-size="11" fill="#C5A55A">$300</text>
  <text x="587" y="174" font-size="11" fill="#C5A55A">$600</text>
  <text x="587" y="117" font-size="11" fill="#C5A55A">$900</text>
  <text x="587" y="59" font-size="11" fill="#C5A55A">$1,200</text>
  <!-- Bars: 2017-2022 (blue), 2023 (red/partial) -->
  <rect x="108" y="199" width="40" height="86" fill="#4C90B7" opacity="0.85"/>
  <rect x="176" y="160" width="40" height="125" fill="#4C90B7" opacity="0.85"/>
  <rect x="244" y="170" width="40" height="115" fill="#4C90B7" opacity="0.85"/>
  <rect x="312" y="180" width="40" height="105" fill="#4C90B7" opacity="0.85"/>
  <rect x="380" y="116" width="40" height="169" fill="#4C90B7" opacity="0.85"/>
  <rect x="448" y="151" width="40" height="134" fill="#4C90B7" opacity="0.85"/>
  <rect x="516" y="228" width="40" height="57" fill="#D95B5B" opacity="0.85"/>
  <!-- Deal value trend line -->
  <polyline points="128,218 196,199 264,205 332,203 400,113 468,170 536,235" fill="none" stroke="#C5A55A" stroke-width="1.5"/>
  <!-- Deal value dots -->
  <polygon points="128,211 135,218 128,225 121,218" fill="#C5A55A"/>
  <polygon points="196,192 203,199 196,206 189,199" fill="#C5A55A"/>
  <polygon points="264,198 271,205 264,212 257,205" fill="#C5A55A"/>
  <polygon points="332,196 339,203 332,210 325,203" fill="#C5A55A"/>
  <polygon points="400,106 407,113 400,120 393,113" fill="#C5A55A"/>
  <polygon points="468,163 475,170 468,177 461,170" fill="#C5A55A"/>
  <polygon points="536,228 543,235 536,242 529,235" fill="#C5A55A"/>
  <!-- X labels -->
  <text x="128" y="302" text-anchor="middle" font-size="11" fill="#666">2017</text>
  <text x="196" y="302" text-anchor="middle" font-size="11" fill="#666">2018</text>
  <text x="264" y="302" text-anchor="middle" font-size="11" fill="#666">2019</text>
  <text x="332" y="302" text-anchor="middle" font-size="11" fill="#666">2020</text>
  <text x="400" y="302" text-anchor="middle" font-size="11" fill="#666">2021</text>
  <text x="468" y="302" text-anchor="middle" font-size="11" fill="#666">2022</text>
  <text x="536" y="302" text-anchor="middle" font-size="11" fill="#666">2023</text>
  <!-- Legend -->
  <rect x="140" y="320" width="13" height="13" fill="#4C90B7" opacity="0.85"/>
  <text x="158" y="331" font-size="11" fill="#555">Number of deals (left axis)</text>
  <polygon points="363,320 370,327 363,334 356,327" fill="#C5A55A"/>
  <text x="378" y="331" font-size="11" fill="#555">Total deal value (right axis)</text>
  <!-- Source -->
  <text x="330" y="354" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Source: Preqin</text>
</svg>
