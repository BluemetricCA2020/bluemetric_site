<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="360" fill="white"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 2 — Vintage Performance: Secondaries vs Private Equity</text>
  <!-- Y axis label -->
  <text transform="translate(14, 165) rotate(-90)" text-anchor="middle" font-size="9" fill="#666">Median IRR</text>
  <!-- Gridlines: Y range 0–50%, chart y=50–280, scale=4.6px/% -->
  <line x1="65" y1="50" x2="610" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="96" x2="610" y2="96" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="142" x2="610" y2="142" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="188" x2="610" y2="188" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="234" x2="610" y2="234" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="280" x2="610" y2="280" stroke="#999" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="65" y1="45" x2="65" y2="284" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="58" y="54" text-anchor="end" font-size="10" fill="#666">50%</text>
  <text x="58" y="100" text-anchor="end" font-size="10" fill="#666">40%</text>
  <text x="58" y="146" text-anchor="end" font-size="10" fill="#666">30%</text>
  <text x="58" y="192" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="58" y="238" text-anchor="end" font-size="10" fill="#666">10%</text>
  <text x="58" y="284" text-anchor="end" font-size="10" fill="#666">0%</text>
  <!-- X labels: 2007–2019 every 2 years, scale=45.42px/yr -->
  <text x="65" y="297" text-anchor="middle" font-size="10" fill="#666">2007</text>
  <text x="156" y="297" text-anchor="middle" font-size="10" fill="#666">2009</text>
  <text x="247" y="297" text-anchor="middle" font-size="10" fill="#666">2011</text>
  <text x="338" y="297" text-anchor="middle" font-size="10" fill="#666">2013</text>
  <text x="429" y="297" text-anchor="middle" font-size="10" fill="#666">2015</text>
  <text x="519" y="297" text-anchor="middle" font-size="10" fill="#666">2017</text>
  <text x="610" y="297" text-anchor="middle" font-size="10" fill="#666">2019</text>

  <!--
    Y = 280 − val × 4.6
    Secondaries: 10%, 22%, 18%, 21%, 26%, 33%, 39%  → y: 234, 179, 197, 183, 160, 128, 101
    Private Equity: 15%, 15%, 18%, 20%, 22%, 26%, 28% → y: 211, 211, 197, 188, 179, 160, 151
  -->

  <!-- Shaded area between lines (Secondaries above PE) -->
  <polygon points="65,234 156,179 247,197 338,183 429,160 519,128 610,101 610,151 519,160 429,179 338,188 247,197 156,211 65,211" fill="#1A2E4A" opacity="0.08"/>

  <!-- Private Equity line (grey) -->
  <polyline points="65,211 156,211 247,197 338,188 429,179 519,160 610,151" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Secondaries line (navy) -->
  <polyline points="65,234 156,179 247,197 338,183 429,160 519,128 610,101" fill="none" stroke="#1A2E4A" stroke-width="2.5"/>

  <!-- 2009 annotation: discount highlight -->
  <line x1="156" y1="179" x2="156" y2="211" stroke="#1A2E4A" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Inline labels -->
  <text x="430" y="153" font-size="11" fill="#1A2E4A" font-weight="500">Secondaries</text>
  <text x="430" y="190" font-size="11" fill="#888" font-weight="500">Private Equity</text>

  <!-- Source -->
  <text x="320" y="325" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Source: Preqin.</text>
</svg>
