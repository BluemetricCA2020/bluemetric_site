<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 375" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="375" fill="white"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Private Equity Risk Mitigation?</text>

  <!-- Gridlines -->
  <line x1="70" y1="55" x2="610" y2="55" stroke="#999" stroke-width="1"/>
  <line x1="70" y1="127" x2="610" y2="127" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="198" x2="610" y2="198" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="270" x2="610" y2="270" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y-axis -->
  <line x1="70" y1="50" x2="70" y2="274" stroke="#999" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="62" y="59" text-anchor="end" font-size="11" fill="#666">0%</text>
  <text x="62" y="131" text-anchor="end" font-size="11" fill="#666">-20%</text>
  <text x="62" y="202" text-anchor="end" font-size="11" fill="#666">-40%</text>
  <text x="62" y="274" text-anchor="end" font-size="11" fill="#666">-60%</text>

  <!-- Group 1: Technology bubble (2000–2002) -->
  <!-- Global -38%: height=136, bottom=191 → label inside at y=179 -->
  <rect x="108" y="55" width="40" height="136" fill="#1A2E4A"/>
  <text x="128" y="179" text-anchor="middle" font-size="11" fill="white">-38%</text>
  <!-- PE -27%: height=97, bottom=152 → label inside at y=140 -->
  <rect x="156" y="55" width="40" height="97" fill="#C5A55A"/>
  <text x="176" y="140" text-anchor="middle" font-size="11" fill="white">-27%</text>
  <!-- Group label -->
  <text x="152" y="285" text-anchor="middle" font-size="10" fill="#555">Technology bubble</text>
  <text x="152" y="298" text-anchor="middle" font-size="10" fill="#555">(2000–2002)</text>

  <!-- Group 2: Financial crisis (2008–2009) -->
  <!-- Global -49%: height=176, bottom=231 → label inside at y=219 -->
  <rect x="234" y="55" width="40" height="176" fill="#1A2E4A"/>
  <text x="254" y="219" text-anchor="middle" font-size="11" fill="white">-49%</text>
  <!-- PE -27%: height=97, bottom=152 → label inside at y=140 -->
  <rect x="282" y="55" width="40" height="97" fill="#C5A55A"/>
  <text x="302" y="140" text-anchor="middle" font-size="11" fill="white">-27%</text>
  <!-- Group label -->
  <text x="278" y="285" text-anchor="middle" font-size="10" fill="#555">Financial crisis</text>
  <text x="278" y="298" text-anchor="middle" font-size="10" fill="#555">(2008–2009)</text>

  <!-- Group 3: COVID crisis (2020) -->
  <!-- Global -21%: height=75, bottom=130 → label inside at y=118 -->
  <rect x="360" y="55" width="40" height="75" fill="#1A2E4A"/>
  <text x="380" y="118" text-anchor="middle" font-size="11" fill="white">-21%</text>
  <!-- PE -7%: height=25, bottom=80 → label outside at y=94 -->
  <rect x="408" y="55" width="40" height="25" fill="#C5A55A"/>
  <text x="428" y="94" text-anchor="middle" font-size="11" fill="#555">-7%</text>
  <!-- Group label -->
  <text x="404" y="285" text-anchor="middle" font-size="10" fill="#555">COVID crisis</text>
  <text x="404" y="298" text-anchor="middle" font-size="10" fill="#555">(2020)</text>

  <!-- Group 4: Inflation concerns (2022) -->
  <!-- Global -25%: height=90, bottom=145 → label inside at y=133 -->
  <rect x="486" y="55" width="40" height="90" fill="#1A2E4A"/>
  <text x="506" y="133" text-anchor="middle" font-size="11" fill="white">-25%</text>
  <!-- PE -3%: height=11, bottom=66 → label outside at y=80 -->
  <rect x="534" y="55" width="40" height="11" fill="#C5A55A"/>
  <text x="554" y="80" text-anchor="middle" font-size="11" fill="#555">-3%</text>
  <!-- Group label -->
  <text x="530" y="285" text-anchor="middle" font-size="10" fill="#555">Inflation concerns</text>
  <text x="530" y="298" text-anchor="middle" font-size="10" fill="#555">(2022)</text>

  <!-- Legend -->
  <rect x="168" y="318" width="13" height="13" fill="#1A2E4A"/>
  <text x="187" y="329" font-size="11" fill="#555">Global equity market</text>
  <rect x="358" y="318" width="13" height="13" fill="#C5A55A"/>
  <text x="377" y="329" font-size="11" fill="#555">Private equity</text>

  <!-- Source -->
  <text x="320" y="360" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Source: Preqin Quarterly Index, quarterly observations, returns in USD.</text>
</svg>
