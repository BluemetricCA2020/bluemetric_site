<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Inter, Arial, sans-serif">
  <rect width="720" height="420" fill="white"/>
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#1A2E4A">Figure 1 — Sector Exposure: PE vs US Economy vs US Stock Market</text>

  <!-- Import sensitivity annotation -->
  <text x="65" y="40" font-size="10" fill="#555" font-weight="600">+ More import-sensitive</text>
  <line x1="65" y1="44" x2="346" y2="44" stroke="#bbb" stroke-width="1"/>
  <line x1="346" y1="44" x2="690" y2="44" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="690" y="40" text-anchor="end" font-size="10" fill="#555" font-weight="600">Less import-sensitive −</text>

  <!-- Gridlines: Y range 0–35%, chart y=55–285, scale=6.571px/% -->
  <line x1="60" y1="55" x2="690" y2="55" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="88" x2="690" y2="88" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="121" x2="690" y2="121" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="154" x2="690" y2="154" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="187" x2="690" y2="187" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="220" x2="690" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="253" x2="690" y2="253" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="285" x2="690" y2="285" stroke="#999" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="60" y1="50" x2="60" y2="289" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="53" y="59" text-anchor="end" font-size="9" fill="#666">35%</text>
  <text x="53" y="92" text-anchor="end" font-size="9" fill="#666">30%</text>
  <text x="53" y="125" text-anchor="end" font-size="9" fill="#666">25%</text>
  <text x="53" y="158" text-anchor="end" font-size="9" fill="#666">20%</text>
  <text x="53" y="191" text-anchor="end" font-size="9" fill="#666">15%</text>
  <text x="53" y="224" text-anchor="end" font-size="9" fill="#666">10%</text>
  <text x="53" y="257" text-anchor="end" font-size="9" fill="#666">5%</text>
  <text x="53" y="289" text-anchor="end" font-size="9" fill="#666">0%</text>

  <!--
    11 sectors, 3 bars each. Bar width=12, gaps=2. Group width=57.3px.
    Centers: [89,146,203,261,318,375,432,490,547,604,661]
    Bar x offsets from center: PE=-20, GDP=-6, S&P=+8
    Scale: 285 − val×6.571  (y = 285 − pct × 6.571)

    Data [PE%, GDP%, S&P%]:
    1 Consumer Disc.   [8, 12, 11]  → h=[53,79,72]  → y=[232,206,213]
    2 Industrials      [14,11,  9]  → h=[92,72,59]  → y=[193,213,226]
    3 Materials        [3,  3,  3]  → h=[20,20,20]  → y=[265,265,265]
    4 Consumer Staples [3,  6,  7]  → h=[20,39,46]  → y=[265,246,239]
    5 Healthcare       [23, 9, 13]  → h=[151,59,85] → y=[134,226,200]
    6 IT               [26, 7, 29]  → h=[171,46,190]→ y=[114,239, 95]
    7 Energy           [3,  8,  5]  → h=[20,53,33]  → y=[265,232,252]
    8 Communication    [4,  5,  9]  → h=[26,33,59]  → y=[259,252,226]
    9 Utilities        [1,  3,  3]  → h=[7, 20,20]  → y=[278,265,265]
   10 Financials       [9, 21, 13]  → h=[59,138,85] → y=[226,147,200]
   11 Real Estate      [2, 12,  3]  → h=[13,79,20]  → y=[272,206,265]
  -->

  <!-- Divider between Healthcare and IT -->
  <line x1="347" y1="55" x2="347" y2="285" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- GROUP 1: Consumer Disc. (c=89) -->
  <rect x="69" y="232" width="12" height="53" fill="#1A2E4A"/>
  <rect x="83" y="206" width="12" height="79" fill="#C5A55A"/>
  <rect x="97" y="213" width="12" height="72" fill="#4C90B7"/>
  <!-- GROUP 2: Industrials (c=146) -->
  <rect x="126" y="193" width="12" height="92" fill="#1A2E4A"/>
  <rect x="140" y="213" width="12" height="72" fill="#C5A55A"/>
  <rect x="154" y="226" width="12" height="59" fill="#4C90B7"/>
  <!-- GROUP 3: Materials (c=203) -->
  <rect x="183" y="265" width="12" height="20" fill="#1A2E4A"/>
  <rect x="197" y="265" width="12" height="20" fill="#C5A55A"/>
  <rect x="211" y="265" width="12" height="20" fill="#4C90B7"/>
  <!-- GROUP 4: Consumer Staples (c=261) -->
  <rect x="241" y="265" width="12" height="20" fill="#1A2E4A"/>
  <rect x="255" y="246" width="12" height="39" fill="#C5A55A"/>
  <rect x="269" y="239" width="12" height="46" fill="#4C90B7"/>
  <!-- GROUP 5: Healthcare (c=318) -->
  <rect x="298" y="134" width="12" height="151" fill="#1A2E4A"/>
  <rect x="312" y="226" width="12" height="59" fill="#C5A55A"/>
  <rect x="326" y="200" width="12" height="85" fill="#4C90B7"/>
  <!-- GROUP 6: IT (c=375) -->
  <rect x="355" y="114" width="12" height="171" fill="#1A2E4A"/>
  <rect x="369" y="239" width="12" height="46" fill="#C5A55A"/>
  <rect x="383" y="95" width="12" height="190" fill="#4C90B7"/>
  <!-- GROUP 7: Energy (c=432) -->
  <rect x="412" y="265" width="12" height="20" fill="#1A2E4A"/>
  <rect x="426" y="232" width="12" height="53" fill="#C5A55A"/>
  <rect x="440" y="252" width="12" height="33" fill="#4C90B7"/>
  <!-- GROUP 8: Communication (c=490) -->
  <rect x="470" y="259" width="12" height="26" fill="#1A2E4A"/>
  <rect x="484" y="252" width="12" height="33" fill="#C5A55A"/>
  <rect x="498" y="226" width="12" height="59" fill="#4C90B7"/>
  <!-- GROUP 9: Utilities (c=547) -->
  <rect x="527" y="278" width="12" height="7" fill="#1A2E4A"/>
  <rect x="541" y="265" width="12" height="20" fill="#C5A55A"/>
  <rect x="555" y="265" width="12" height="20" fill="#4C90B7"/>
  <!-- GROUP 10: Financials (c=604) -->
  <rect x="584" y="226" width="12" height="59" fill="#1A2E4A"/>
  <rect x="598" y="147" width="12" height="138" fill="#C5A55A"/>
  <rect x="612" y="200" width="12" height="85" fill="#4C90B7"/>
  <!-- GROUP 11: Real Estate (c=661) -->
  <rect x="641" y="272" width="12" height="13" fill="#1A2E4A"/>
  <rect x="655" y="206" width="12" height="79" fill="#C5A55A"/>
  <rect x="669" y="265" width="12" height="20" fill="#4C90B7"/>

  <!-- X axis sector labels (rotated -40°) -->
  <text transform="translate(89,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Consumer Disc.</text>
  <text transform="translate(146,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Industrials</text>
  <text transform="translate(203,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Materials</text>
  <text transform="translate(261,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Cons. Staples</text>
  <text transform="translate(318,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Healthcare</text>
  <text transform="translate(375,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">IT</text>
  <text transform="translate(432,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Energy</text>
  <text transform="translate(490,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Communication</text>
  <text transform="translate(547,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Utilities</text>
  <text transform="translate(604,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Financials</text>
  <text transform="translate(661,292) rotate(-40)" text-anchor="end" font-size="8.5" fill="#555">Real Estate</text>

  <!-- Legend -->
  <rect x="100" y="368" width="13" height="13" fill="#1A2E4A"/>
  <text x="118" y="379" font-size="11" fill="#555">PE Exposure</text>
  <rect x="250" y="368" width="13" height="13" fill="#C5A55A"/>
  <text x="268" y="379" font-size="11" fill="#555">US GDP Contribution</text>
  <rect x="430" y="368" width="13" height="13" fill="#4C90B7"/>
  <text x="448" y="379" font-size="11" fill="#555">US Stock Market</text>

  <!-- Source -->
  <text x="360" y="400" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Source: Bureau of Economic Analysis, Neuberger Berman, S&amp;P Global.</text>
</svg>
