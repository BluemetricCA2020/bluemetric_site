<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="360" fill="white"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 3 — Berkshire Hathaway Asset Allocation</text>
  <!-- Gridlines: Y range 0–100%, chart y=50–280, scale=2.3px/% -->
  <line x1="65" y1="50" x2="610" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="96" x2="610" y2="96" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="142" x2="610" y2="142" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="188" x2="610" y2="188" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="234" x2="610" y2="234" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="280" x2="610" y2="280" stroke="#999" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="65" y1="45" x2="65" y2="284" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="58" y="54" text-anchor="end" font-size="10" fill="#666">100%</text>
  <text x="58" y="100" text-anchor="end" font-size="10" fill="#666">80%</text>
  <text x="58" y="146" text-anchor="end" font-size="10" fill="#666">60%</text>
  <text x="58" y="192" text-anchor="end" font-size="10" fill="#666">40%</text>
  <text x="58" y="238" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="58" y="284" text-anchor="end" font-size="10" fill="#666">0%</text>
  <!-- X labels: 2000–2020 every 5 years, scale=27.25px/yr -->
  <text x="65" y="297" text-anchor="middle" font-size="10" fill="#666">2000</text>
  <text x="201" y="297" text-anchor="middle" font-size="10" fill="#666">2005</text>
  <text x="338" y="297" text-anchor="middle" font-size="10" fill="#666">2010</text>
  <text x="474" y="297" text-anchor="middle" font-size="10" fill="#666">2015</text>
  <text x="610" y="297" text-anchor="middle" font-size="10" fill="#666">2020</text>

  <!--
    Stacked area chart: Cash (gold) at bottom, Listed (accent) in middle, Private (navy) at top
    Data (approx):
      Year:    2000  2005  2010  2015  2020
      Cash:     15%   15%   16%   15%   15%
      Listed:   43%   37%   34%   32%   30%
      Private:  42%   48%   50%   53%   55%

    Cumulative:
      Cash top:            15%  15%  16%  15%  15%
      Cash+Listed top:     58%  52%  50%  47%  45%
      100%:               100% 100% 100% 100% 100%

    y positions (y = 280 - val*2.3):
      Cash top:  y = 246, 246, 243, 246, 246
      Listed top: y = 147, 160, 165, 172, 177
      100% top:  y = 50
  -->

  <!-- Cash area (gold) -->
  <polygon points="65,280 201,280 338,280 474,280 610,280 610,246 474,246 338,243 201,246 65,246" fill="#C5A55A" opacity="0.85"/>

  <!-- Listed equities area (accent blue) -->
  <polygon points="65,246 201,246 338,243 474,246 610,246 610,177 474,172 338,165 201,160 65,147" fill="#4C90B7" opacity="0.85"/>

  <!-- Private companies area (navy) -->
  <polygon points="65,147 201,160 338,165 474,172 610,177 610,50 474,50 338,50 201,50 65,50" fill="#1A2E4A" opacity="0.9"/>

  <!-- Separator lines between areas -->
  <polyline points="65,246 201,246 338,243 474,246 610,246" fill="none" stroke="white" stroke-width="1.5"/>
  <polyline points="65,147 201,160 338,165 474,172 610,177" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Labels inside areas -->
  <text x="338" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="white">Private Companies</text>
  <text x="338" y="172" text-anchor="middle" font-size="12" font-weight="500" fill="white">Listed Equities</text>
  <text x="338" y="265" text-anchor="middle" font-size="11" font-weight="500" fill="white">Cash</text>

  <!-- Legend -->
  <rect x="82" y="312" width="13" height="13" fill="#1A2E4A" opacity="0.9"/>
  <text x="100" y="323" font-size="11" fill="#555">Private companies</text>
  <rect x="240" y="312" width="13" height="13" fill="#4C90B7" opacity="0.85"/>
  <text x="258" y="323" font-size="11" fill="#555">Listed equities</text>
  <rect x="390" y="312" width="13" height="13" fill="#C5A55A" opacity="0.85"/>
  <text x="408" y="323" font-size="11" fill="#555">Cash &amp; equivalents</text>

  <!-- Source -->
  <text x="320" y="345" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Source: Berkshire Hathaway Annual Reports (2000–2020), Bluemetric estimates.</text>
</svg>
