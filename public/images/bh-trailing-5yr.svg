<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="360" fill="white"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 2 — Trailing 5-Year Annualised Returns</text>
  <!-- Gridlines: Y range -10% to 50%, 0% at y=242, scale=3.833px/% -->
  <line x1="65" y1="50" x2="610" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="88" x2="610" y2="88" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="127" x2="610" y2="127" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="165" x2="610" y2="165" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="203" x2="610" y2="203" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="242" x2="610" y2="242" stroke="#999" stroke-width="1.5"/>
  <line x1="65" y1="280" x2="610" y2="280" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Y axis -->
  <line x1="65" y1="45" x2="65" y2="284" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="58" y="54" text-anchor="end" font-size="10" fill="#666">50%</text>
  <text x="58" y="92" text-anchor="end" font-size="10" fill="#666">40%</text>
  <text x="58" y="131" text-anchor="end" font-size="10" fill="#666">30%</text>
  <text x="58" y="169" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="58" y="207" text-anchor="end" font-size="10" fill="#666">10%</text>
  <text x="58" y="246" text-anchor="end" font-size="10" fill="#666">0%</text>
  <text x="58" y="284" text-anchor="end" font-size="10" fill="#666">-10%</text>
  <!-- X labels: 1992–2022 every 3 years, scale=18.17px/yr -->
  <text x="65" y="297" text-anchor="middle" font-size="10" fill="#666">1992</text>
  <text x="120" y="297" text-anchor="middle" font-size="10" fill="#666">1995</text>
  <text x="174" y="297" text-anchor="middle" font-size="10" fill="#666">1998</text>
  <text x="229" y="297" text-anchor="middle" font-size="10" fill="#666">2001</text>
  <text x="283" y="297" text-anchor="middle" font-size="10" fill="#666">2004</text>
  <text x="338" y="297" text-anchor="middle" font-size="10" fill="#666">2007</text>
  <text x="392" y="297" text-anchor="middle" font-size="10" fill="#666">2010</text>
  <text x="447" y="297" text-anchor="middle" font-size="10" fill="#666">2013</text>
  <text x="501" y="297" text-anchor="middle" font-size="10" fill="#666">2016</text>
  <text x="556" y="297" text-anchor="middle" font-size="10" fill="#666">2019</text>
  <text x="610" y="297" text-anchor="middle" font-size="10" fill="#666">2022</text>
  <!-- Berkshire Hathaway line (navy) — starts high, converges down -->
  <polyline points="65,108 120,96 174,157 229,203 283,211 338,173 392,230 447,165 501,196 556,184 610,196" fill="none" stroke="#1A2E4A" stroke-width="2.5"/>
  <!-- S&P 500 line (gold) — lower in early years, converges -->
  <polyline points="65,203 120,184 174,157 229,253 283,253 338,223 392,234 447,184 501,192 556,196 610,196" fill="none" stroke="#C5A55A" stroke-width="2.5"/>
  <!-- Inline labels -->
  <text x="75" y="102" font-size="11" fill="#1A2E4A" font-weight="500">Berkshire Hathaway</text>
  <text x="75" y="220" font-size="11" fill="#C5A55A" font-weight="500">S&amp;P 500</text>
  <!-- Source -->
  <text x="320" y="325" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Source: Bloomberg (1992 – 2022), trailing 5-year annualised total returns.</text>
</svg>
