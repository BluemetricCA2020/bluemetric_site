<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 390" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="390" fill="white"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 1 — Value Creation Bridge</text>
  <text transform="translate(14, 180) rotate(-90)" text-anchor="middle" font-size="9" fill="#666">% contribution to total value creation</text>
  <!-- Gridlines: Y range -20% to 120%, 0% at y=273, scale=1.857px/% -->
  <line x1="75" y1="50" x2="580" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="87" x2="580" y2="87" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="124" x2="580" y2="124" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="161" x2="580" y2="161" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="199" x2="580" y2="199" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="236" x2="580" y2="236" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="273" x2="580" y2="273" stroke="#999" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="580" y2="310" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Y axis -->
  <line x1="75" y1="45" x2="75" y2="314" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="68" y="54" text-anchor="end" font-size="10" fill="#666">120%</text>
  <text x="68" y="91" text-anchor="end" font-size="10" fill="#666">100%</text>
  <text x="68" y="128" text-anchor="end" font-size="10" fill="#666">80%</text>
  <text x="68" y="165" text-anchor="end" font-size="10" fill="#666">60%</text>
  <text x="68" y="203" text-anchor="end" font-size="10" fill="#666">40%</text>
  <text x="68" y="240" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="68" y="277" text-anchor="end" font-size="10" fill="#666">0%</text>
  <text x="68" y="314" text-anchor="end" font-size="10" fill="#666">-20%</text>

  <!-- PRE-2000 BAR (x=115, w=120) -->
  <!-- Debt (70%): y=65, h=130 -->
  <rect x="115" y="65" width="120" height="130" fill="#C5A55A"/>
  <text x="175" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="white">70%</text>
  <!-- Growth (42%): y=195, h=78 -->
  <rect x="115" y="195" width="120" height="78" fill="#1A2E4A"/>
  <text x="175" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="white">42%</text>
  <!-- Multiple (-12%): y=273, h=22 -->
  <rect x="115" y="273" width="120" height="22" fill="#4C90B7"/>
  <text x="175" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="white">-12%</text>

  <!-- 2000-2007 BAR (x=270, w=120) -->
  <!-- Debt (50%): y=89, h=93 -->
  <rect x="270" y="89" width="120" height="93" fill="#C5A55A"/>
  <text x="330" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="white">50%</text>
  <!-- Growth (37%): y=182, h=69 -->
  <rect x="270" y="182" width="120" height="69" fill="#1A2E4A"/>
  <text x="330" y="221" text-anchor="middle" font-size="13" font-weight="600" fill="white">37%</text>
  <!-- Multiple (12%): y=251, h=22 -->
  <rect x="270" y="251" width="120" height="22" fill="#4C90B7"/>
  <text x="330" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="white">12%</text>

  <!-- 2008-PRESENT BAR (x=425, w=120) -->
  <!-- Debt (25%): y=88, h=46 -->
  <rect x="425" y="88" width="120" height="46" fill="#C5A55A"/>
  <text x="485" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="white">25%</text>
  <!-- Growth (47%): y=134, h=87 -->
  <rect x="425" y="134" width="120" height="87" fill="#1A2E4A"/>
  <text x="485" y="183" text-anchor="middle" font-size="13" font-weight="600" fill="white">47%</text>
  <!-- Multiple (28%): y=221, h=52 -->
  <rect x="425" y="221" width="120" height="52" fill="#4C90B7"/>
  <text x="485" y="251" text-anchor="middle" font-size="13" font-weight="600" fill="white">28%</text>

  <!-- X labels -->
  <text x="175" y="316" text-anchor="middle" font-size="11" fill="#555">Pre-2000</text>
  <text x="330" y="316" text-anchor="middle" font-size="11" fill="#555">2000–2007</text>
  <text x="485" y="316" text-anchor="middle" font-size="11" fill="#555">2008–present</text>

  <!-- Legend -->
  <rect x="82" y="332" width="13" height="13" fill="#1A2E4A"/>
  <text x="100" y="343" font-size="11" fill="#555">Revenue / profit growth</text>
  <rect x="275" y="332" width="13" height="13" fill="#4C90B7"/>
  <text x="293" y="343" font-size="11" fill="#555">Multiple expansion</text>
  <rect x="440" y="332" width="13" height="13" fill="#C5A55A"/>
  <text x="458" y="343" font-size="11" fill="#555">Debt / leverage</text>

  <!-- Source -->
  <text x="320" y="370" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Source: Institute for Private Capital: Performance Analysis and Attribution with Alternative Investments</text>
</svg>
