<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="360" fill="white"/>
  <text x="320" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#1A2E4A">Figure 2 — IRR Distribution: Specialty Finance Funds (1994–2021)</text>
  <!-- Y axis label -->
  <text transform="translate(14, 165) rotate(-90)" text-anchor="middle" font-size="9" fill="#666">Internal Rate of Return</text>
  <!-- Gridlines: Y range 0–20%, chart y=50–280, scale=11.5px/% -->
  <line x1="65" y1="50" x2="555" y2="50" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="108" x2="555" y2="108" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="165" x2="555" y2="165" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="223" x2="555" y2="223" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="65" y1="280" x2="555" y2="280" stroke="#999" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="65" y1="45" x2="65" y2="284" stroke="#999" stroke-width="1"/>
  <!-- Y labels -->
  <text x="58" y="54" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="58" y="112" text-anchor="end" font-size="10" fill="#666">15%</text>
  <text x="58" y="169" text-anchor="end" font-size="10" fill="#666">10%</text>
  <text x="58" y="227" text-anchor="end" font-size="10" fill="#666">5%</text>
  <text x="58" y="284" text-anchor="end" font-size="10" fill="#666">0%</text>

  <!--
    Single stacked bar: x=190 to x=450 (260px wide)
    Y = 280 − val × 11.5
    Bottom 25%  (0–4%):   y=280, h=46  → y=234 to 280  fill=#888
    25–50%      (4–9%):   y=234, h=57  → y=177 to 234  fill=#B8D0E4
    50–75%      (9–13%):  y=177, h=46  → y=131 to 177  fill=#4C90B7
    Top 25%     (13–17%): y=131, h=46  → y=85  to 131  fill=#1A2E4A
    Diamond avg at 12%:   y=280−12×11.5=280−138=142
  -->

  <!-- Bottom 25% (grey) -->
  <rect x="190" y="234" width="260" height="46" fill="#888888" opacity="0.7"/>
  <!-- 25–50% (light blue) -->
  <rect x="190" y="177" width="260" height="57" fill="#B8D0E4"/>
  <!-- 50–75% (accent blue) -->
  <rect x="190" y="131" width="260" height="46" fill="#4C90B7"/>
  <!-- Top 25% (navy) -->
  <rect x="190" y="85" width="260" height="46" fill="#1A2E4A"/>

  <!-- Average diamond marker at 12% (~y=142) -->
  <polygon points="320,132 332,142 320,152 308,142" fill="#C5A55A"/>

  <!-- Legend (right side, aligned with each segment midpoint) -->
  <rect x="460" y="98" width="12" height="12" fill="#1A2E4A"/>
  <text x="476" y="109" font-size="11" fill="#555">Top 25%</text>
  <rect x="460" y="148" width="12" height="12" fill="#4C90B7"/>
  <text x="476" y="159" font-size="11" fill="#555">50–75%</text>
  <rect x="460" y="198" width="12" height="12" fill="#B8D0E4"/>
  <text x="476" y="209" font-size="11" fill="#555">25–50%</text>
  <rect x="460" y="248" width="12" height="12" fill="#888888" opacity="0.7"/>
  <text x="476" y="259" font-size="11" fill="#555">Bottom 25%</text>
  <!-- Average legend -->
  <polygon points="472,274 480,282 472,290 464,282" fill="#C5A55A"/>
  <text x="488" y="286" font-size="11" fill="#555">Average (~12%)</text>

  <!-- Source -->
  <text x="320" y="320" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Source: Cambridge Associates LLC. Outliers excluded (IRR outliers: −8.5%, 30.8%, 38.5%, 83.3%).</text>
</svg>
